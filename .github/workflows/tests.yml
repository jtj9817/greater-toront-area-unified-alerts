name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: '8.4'
            run_quality_gate: true
          - php-version: '8.5'
            run_quality_gate: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Node Dependencies
        run: pnpm install --frozen-lockfile

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: pnpm run build

      - name: Frontend Types
        run: pnpm run types

      - name: Frontend Tests
        env:
          LARAVEL_BYPASS_ENV_CHECK: 1
        run: pnpm run test

      - name: Backend Tests
        if: ${{ !matrix.run_quality_gate }}
        run: ./vendor/bin/pest

      - name: Quality Gate (Coverage + Audits)
        if: ${{ matrix.run_quality_gate }}
        env:
          LARAVEL_BYPASS_ENV_CHECK: 1
        run: |
          XDEBUG_MODE=coverage composer test:coverage:unified-alerts
          pnpm run coverage
          composer audit
          pnpm audit --audit-level high
