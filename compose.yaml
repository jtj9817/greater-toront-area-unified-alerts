services:
    laravel.test:
        build:
            context: ./vendor/laravel/sail/runtimes/8.5
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: sail-8.5/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - pgsql
            - redis
    pgsql:
        image: 'postgres:17-alpine'
        ports:
            - '${FORWARD_PG_PORT:-5432}:5432'
        environment:
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD-SHELL
                - 'pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}'
            retries: 5
            timeout: 5s
    mysql-testing:
        image: 'mysql:8.4'
        environment:
            MYSQL_ROOT_PASSWORD: '${TEST_DB_ROOT_PASSWORD:-password}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${TEST_DB_DATABASE:-gta_alerts_testing}'
            MYSQL_USER: '${TEST_DB_USERNAME:-sail}'
            MYSQL_PASSWORD: '${TEST_DB_PASSWORD:-password}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
            MYSQL_EXTRA_OPTIONS: '${MYSQL_EXTRA_OPTIONS:-}'
        volumes:
            - 'sail-mysql-testing:/var/lib/mysql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${TEST_DB_ROOT_PASSWORD:-password}'
            retries: 3
            timeout: 5s
        profiles:
            - testing
    pgsql-testing:
        image: 'postgres:17-alpine'
        environment:
            POSTGRES_DB: '${TEST_PG_DATABASE:-gta_alerts_testing_pgsql}'
            POSTGRES_USER: '${TEST_PG_USERNAME:-sail}'
            POSTGRES_PASSWORD: '${TEST_PG_PASSWORD:-password}'
        volumes:
            - 'sail-pgsql-testing:/var/lib/postgresql/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD-SHELL
                - 'pg_isready -U ${TEST_PG_USERNAME:-sail} -d ${TEST_PG_DATABASE:-gta_alerts_testing_pgsql}'
            retries: 5
            timeout: 5s
        profiles:
            - testing
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
networks:
    sail:
        driver: bridge
volumes:
    sail-pgsql:
        driver: local
    sail-mysql-testing:
        driver: local
    sail-pgsql-testing:
        driver: local
    sail-redis:
        driver: local
